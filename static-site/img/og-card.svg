<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06070b"/>
      <stop offset="100%" stop-color="#0b0d12"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#00e599" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00e599" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#00c2ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00c2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e599"/>
      <stop offset="100%" stop-color="#00c2ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentLine)"/>

  <!-- Subtle grid texture -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Top-left brand -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#8c919a" letter-spacing="0.5">
    <text x="80" y="80"><tspan fill="#e4e6ea">joe</tspan><tspan fill="#00e599">@</tspan>mattiello<tspan fill="#555960"> ~$</tspan></text>
  </g>

  <!-- Top-right availability tag -->
  <g transform="translate(1120 65)" text-anchor="end">
    <rect x="-260" y="-25" width="260" height="36" rx="18" fill="#00e599" fill-opacity="0.08" stroke="#00e599" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="-238" cy="-7" r="4" fill="#00e599"/>
    <text x="-12" y="0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#00e599" letter-spacing="1.5" text-transform="uppercase">CONSULTING · Q3 2026</text>
  </g>

  <!-- Main content -->
  <g font-family="Space Mono, ui-monospace, monospace">
    <!-- Eyebrow -->
    <text x="80" y="200" font-size="20" fill="#00e599" letter-spacing="3" font-weight="700">ENGINEERING LEADER  ·  MOBILE ARCHITECT  ·  NYC</text>

    <!-- Name -->
    <text x="80" y="290" font-size="84" font-weight="700" fill="#e4e6ea" letter-spacing="-2">Joseph</text>
    <text x="80" y="380" font-size="84" font-weight="700" fill="#00e599" letter-spacing="-2">Mattiello</text>

    <!-- Tagline -->
    <text x="80" y="445" font-family="Outfit, system-ui, sans-serif" font-size="28" fill="#b3b6bc" font-weight="400">Creator of Provenance EMU  ·  3 US patents  ·  AI/LLM tooling</text>
  </g>

  <!-- Bottom stats row -->
  <g transform="translate(80 530)" font-family="JetBrains Mono, ui-monospace, monospace">
    <g>
      <text x="0" y="0" font-size="40" font-weight="700" fill="#00e599" letter-spacing="-1">388k+</text>
      <text x="0" y="26" font-size="13" fill="#8c919a" letter-spacing="2">PROVENANCE DLs</text>
    </g>
    <g transform="translate(220 0)">
      <text x="0" y="0" font-size="40" font-weight="700" fill="#00c2ff" letter-spacing="-1">17+</text>
      <text x="0" y="26" font-size="13" fill="#8c919a" letter-spacing="2">YEARS iOS</text>
    </g>
    <g transform="translate(380 0)">
      <text x="0" y="0" font-size="40" font-weight="700" fill="#f0a030" letter-spacing="-1">3</text>
      <text x="0" y="26" font-size="13" fill="#8c919a" letter-spacing="2">US PATENTS</text>
    </g>
    <g transform="translate(500 0)">
      <text x="0" y="0" font-size="40" font-weight="700" fill="#ff4088" letter-spacing="-1">8</text>
      <text x="0" y="26" font-size="13" fill="#8c919a" letter-spacing="2">REGIONS LED</text>
    </g>
  </g>

  <!-- URL bottom-right -->
  <g transform="translate(1120 565)" text-anchor="end">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#e4e6ea" font-weight="700">joemattiello.dev</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accentLine)"/>
</svg>
