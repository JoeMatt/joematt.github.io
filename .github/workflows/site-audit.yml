name: Site Audit

on:
  push:
    branches: [master]
    paths-ignore:
      - 'static-site/status/data.json'
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 7am UTC
  workflow_dispatch:

concurrency:
  group: site-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:

  # ──────────────────────────────────────────────────────────
  # HTML & Link Check
  # ──────────────────────────────────────────────────────────
  html-check:
    name: HTML & Link Check
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.result.outputs.passed }}
      error_count: ${{ steps.result.outputs.error_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install htmlproofer
        run: gem install html-proofer

      - name: Run htmlproofer
        id: htmlproofer
        continue-on-error: true
        run: |
          htmlproofer ./static-site \
            --checks Links,Images,Scripts,OpenGraph \
            --ignore-urls "/localhost/,/twitter\.com/,/x\.com/,/linkedin\.com/,/instagram\.com/,/discord\.gg/,/api\.github\.com/,/github\.com\/login/,/fonts\.gstatic\.com/,/fonts\.googleapis\.com/,/observatory-api/,/ssllabs/,/spotify\.com/" \
            --ignore-status-codes "0,429,999,403" \
            --ignore-files "/status\/index\.html/" \
            2>&1 | tee htmlproofer-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse results
        id: result
        if: always()
        run: |
          if [ "${{ steps.htmlproofer.outputs.exit_code }}" = "0" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "error_count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(grep -c "^\* At" htmlproofer-output.txt 2>/dev/null | tr -d '[:space:]' || echo "0")
            COUNT=$(printf '%d' "${COUNT:-0}" 2>/dev/null || echo "0")
            echo "passed=false" >> $GITHUB_OUTPUT
            printf 'error_count=%d\n' "$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htmlproofer-output
          path: htmlproofer-output.txt
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # Lighthouse
  # ──────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    outputs:
      performance: ${{ steps.scores.outputs.performance }}
      accessibility: ${{ steps.scores.outputs.accessibility }}
      best_practices: ${{ steps.scores.outputs.best_practices }}
      seo: ${{ steps.scores.outputs.seo }}
      report_url: ${{ steps.scores.outputs.report_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://joemattiello.dev/
            https://joemattiello.dev/status/
          configPath: ./.lighthouserc.yml
          temporaryPublicStorage: true

      - name: Extract scores from LHR JSON
        id: scores
        run: |
          RESULTS_PATH="${{ steps.lhci.outputs.resultsPath }}"
          SEARCH_DIR="${RESULTS_PATH:-.lighthouseci}"
          if [ -z "$(find "$SEARCH_DIR" -name "lhr-*.json" 2>/dev/null | head -1)" ]; then
            SEARCH_DIR="."
          fi
          REPORT=""
          for f in $(find "$SEARCH_DIR" -maxdepth 6 -name "lhr-*.json" 2>/dev/null); do
            URL_IN_LHR=$(jq -r '.requestedUrl // .finalUrl // ""' "$f" 2>/dev/null)
            if [[ "$URL_IN_LHR" == "https://joemattiello.dev" || "$URL_IN_LHR" == "https://joemattiello.dev/" ]]; then
              REPORT="$f"
              break
            fi
          done
          if [ -z "$REPORT" ]; then
            REPORT=$(find "$SEARCH_DIR" -maxdepth 6 -name "lhr-*.json" 2>/dev/null | head -1)
          fi
          if [ -z "$REPORT" ]; then
            echo "No LHR file found"
            echo "performance=0" >> $GITHUB_OUTPUT
            echo "accessibility=0" >> $GITHUB_OUTPUT
            echo "best_practices=0" >> $GITHUB_OUTPUT
            echo "seo=0" >> $GITHUB_OUTPUT
            echo "report_url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          PERF=$(jq '(.categories.performance.score    // 0) * 100 | round' < "$REPORT")
          A11Y=$(jq '(.categories.accessibility.score  // 0) * 100 | round' < "$REPORT")
          BP=$(jq   '(."categories"."best-practices".score // 0) * 100 | round' < "$REPORT")
          SEO=$(jq  '(.categories.seo.score             // 0) * 100 | round' < "$REPORT")
          echo "performance=$PERF" >> $GITHUB_OUTPUT
          echo "accessibility=$A11Y" >> $GITHUB_OUTPUT
          echo "best_practices=$BP" >> $GITHUB_OUTPUT
          echo "seo=$SEO" >> $GITHUB_OUTPUT
          LINKS='${{ steps.lhci.outputs.links }}'
          REPORT_URL=$(echo "$LINKS" | python3 -c "
          import json, sys
          try:
              d = json.loads(sys.stdin.read())
              for key in d:
                  if key.rstrip('/') == 'https://joemattiello.dev':
                      print(d[key]); sys.exit(0)
              print(list(d.values())[0] if d else '')
          except: print('')
          " 2>/dev/null || echo "")
          echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT

      - name: Job summary
        if: always()
        run: |
          P="${{ steps.scores.outputs.performance }}"
          A="${{ steps.scores.outputs.accessibility }}"
          B="${{ steps.scores.outputs.best_practices }}"
          S="${{ steps.scores.outputs.seo }}"
          icon() { local s="${1:-0}"; [[ "$s" =~ ^[0-9]+$ ]] && [ "$s" -ge "$2" ] && echo "✅" || echo "❌"; }
          {
            echo "## 🔦 Lighthouse Scores"
            echo
            echo "| Category | Score | Status |"
            echo "|---|:---:|:---:|"
            echo "| Performance    | ${P:-–} | $(icon $P 70) |"
            echo "| Accessibility  | ${A:-–} | $(icon $A 80) |"
            echo "| Best Practices | ${B:-–} | $(icon $B 80) |"
            echo "| SEO            | ${S:-–} | $(icon $S 90) |"
          } >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # Security Scan (Mozilla Observatory + SSL Labs)
  # ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      observatory_grade: ${{ steps.observatory.outputs.grade }}
      observatory_score: ${{ steps.observatory.outputs.score }}
      ssl_grade: ${{ steps.ssl.outputs.grade }}
    steps:
      - name: Mozilla Observatory
        id: observatory
        run: |
          RESULT=$(curl -s -X POST "https://observatory-api.mdn.mozilla.net/api/v2/scan?host=joemattiello.dev")
          GRADE=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('grade','N/A'))" 2>/dev/null || echo "N/A")
          SCORE=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(int(d.get('score',0)))" 2>/dev/null || echo "0")
          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Observatory: $GRADE ($SCORE/100)"

      - name: SSL Labs
        id: ssl
        run: |
          # Force a fresh scan only on the Monday cron (weekly refresh) or on
          # manual workflow_dispatch. Otherwise rely on SSL Labs' own 24h cache
          # to return instantly and avoid hammering their API.
          FORCE_FRESH="false"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FORCE_FRESH="true"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FORCE_FRESH="true"
          fi

          if [ "$FORCE_FRESH" = "true" ]; then
            KICKOFF_QS="startNew=on&publish=off"
            POLL_QS="publish=off"
            echo "SSL Labs: forcing fresh scan (event=${{ github.event_name }})"
          else
            KICKOFF_QS="fromCache=on&maxAge=24&publish=off"
            POLL_QS="fromCache=on&maxAge=24&publish=off"
            echo "SSL Labs: using cached result if available (maxAge=24h)"
          fi

          # Kick off (or request cached) analysis
          curl -s "https://api.ssllabs.com/api/v3/analyze?host=joemattiello.dev&${KICKOFF_QS}" > /dev/null

          GRADE="N/A"
          STATUS=""
          MAX_RETRIES=30

          # Initial analyzer warm-up: SSL Labs needs ~30s before useful progress
          # is reported. After that, poll every 15s.
          echo "SSL Labs: sleeping 30s for analyzer warm-up..."
          sleep 30

          for i in $(seq 1 $MAX_RETRIES); do
            RESULT=$(curl -s "https://api.ssllabs.com/api/v3/analyze?host=joemattiello.dev&${POLL_QS}")
            STATUS=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")

            # Per-endpoint progress (when IN_PROGRESS, each endpoint has a
            # 'progress' int 0-100 and a 'statusDetailsMessage')
            PROGRESS_LINE=$(echo "$RESULT" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              eps=d.get('endpoints',[]) or []
              parts=[]
              for ep in eps:
                  ip = ep.get('ipAddress','?')
                  st = ep.get('statusMessage','')
                  pr = ep.get('progress')
                  msg = ep.get('statusDetailsMessage','')
                  if pr is not None:
                      parts.append(f'{ip}: {st} {pr}% {msg}'.strip())
                  else:
                      parts.append(f'{ip}: {st} {msg}'.strip())
              print(' | '.join(parts))
          except Exception:
              print('')
              " 2>/dev/null || echo "")

            echo "SSL Labs status: $STATUS (attempt $i/$MAX_RETRIES)${PROGRESS_LINE:+ — $PROGRESS_LINE}"

            if [ "$STATUS" = "READY" ]; then
              GRADE=$(echo "$RESULT" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          eps=d.get('endpoints',[])
          print(eps[0].get('grade','N/A') if eps else 'N/A')
              " 2>/dev/null || echo "N/A")
              break
            fi
            if [ "$STATUS" = "ERROR" ]; then
              echo "::warning::SSL Labs analysis returned ERROR status, aborting poll"
              break
            fi

            sleep 15
          done

          if [ "$STATUS" != "READY" ] && [ "$STATUS" != "ERROR" ]; then
            echo "::warning::SSL Labs analysis did not complete within $MAX_RETRIES retries (10 minutes). Last status: $STATUS"
          fi

          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          echo "SSL Labs: $GRADE"

  # ──────────────────────────────────────────────────────────
  # Open Source Impact (GitHub API)
  # ──────────────────────────────────────────────────────────
  oss-impact:
    name: Open-source Impact
    runs-on: ubuntu-latest
    outputs:
      data: ${{ steps.collect.outputs.data }}
    steps:
      - name: Collect OSS metrics
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stars across maintained repos
          REPOS=("Provenance-Emu/Provenance" "Provenance-Emu/wiki" "JoeMatt/atari_jaguar_240p_test_suite" "HeroTransitions/Hero")
          TOTAL_STARS=0
          for repo in "${REPOS[@]}"; do
            S=$(gh api "repos/$repo" --jq '.stargazers_count' 2>/dev/null || echo 0)
            TOTAL_STARS=$((TOTAL_STARS + S))
          done

          # Provenance specifics
          PROV_STARS=$(gh api repos/Provenance-Emu/Provenance --jq '.stargazers_count' 2>/dev/null || echo 0)
          PROV_DOWNLOADS=$(gh api repos/Provenance-Emu/Provenance/releases --paginate --jq '[.[] | .assets[].download_count] | add' 2>/dev/null || echo 0)

          # Contributors on Provenance
          CONTRIBS=$(gh api repos/Provenance-Emu/Provenance/contributors --paginate --jq 'length' 2>/dev/null | awk '{s+=$1} END{print s+0}')

          # Lifetime merged PRs
          MERGED_PRS=$(gh api 'search/issues?q=is:pr+author:JoeMatt+is:merged' --jq '.total_count' 2>/dev/null || echo 0)

          # AI workflow count (count workflow files in Provenance)
          WF_COUNT=$(gh api repos/Provenance-Emu/Provenance/contents/.github/workflows --jq '[.[].name | select(test("ai-|claude|cursor|kimi|copilot|auto-translate|repo-health"))] | length' 2>/dev/null || echo 0)

          # Build JSON output (compact, single line for outputs)
          JSON=$(python3 - <<PYEOF
          import json
          print(json.dumps({
              "total_stars": $TOTAL_STARS,
              "total_prs_merged": $MERGED_PRS,
              "total_contributors": $CONTRIBS,
              "provenance_stars": $PROV_STARS,
              "provenance_downloads": $PROV_DOWNLOADS,
              "ai_workflow_count": $WF_COUNT
          }))
          PYEOF
          )
          echo "data=$JSON" >> $GITHUB_OUTPUT
          echo "$JSON"

  # ──────────────────────────────────────────────────────────
  # Update status & commit
  # ──────────────────────────────────────────────────────────
  update-status:
    name: Update Status
    runs-on: ubuntu-latest
    needs: [html-check, lighthouse, security-scan, oss-impact]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate data.json
        env:
          PERF: ${{ needs.lighthouse.outputs.performance }}
          A11Y: ${{ needs.lighthouse.outputs.accessibility }}
          BP: ${{ needs.lighthouse.outputs.best_practices }}
          SEO: ${{ needs.lighthouse.outputs.seo }}
          REPORT_URL: ${{ needs.lighthouse.outputs.report_url }}
          OBS_GRADE: ${{ needs.security-scan.outputs.observatory_grade }}
          OBS_SCORE: ${{ needs.security-scan.outputs.observatory_score }}
          SSL_GRADE: ${{ needs.security-scan.outputs.ssl_grade }}
          HTML_PASSED: ${{ needs.html-check.outputs.passed }}
          HTML_ERRORS: ${{ needs.html-check.outputs.error_count }}
          OSS_DATA: ${{ needs.oss-impact.outputs.data }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime

          def intval(key, default=0):
              try: return int(os.environ.get(key, '') or default)
              except: return default

          oss = {}
          try:
              oss = json.loads(os.environ.get("OSS_DATA", "{}") or "{}")
          except Exception:
              oss = {}

          ai_workflow_count = oss.pop("ai_workflow_count", 9)
          oss.setdefault("discord_members", 9373)

          data = {
              "last_updated": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              "run_url": os.environ.get("RUN_URL", ""),
              "html_check": {
                  "passed": os.environ.get("HTML_PASSED", "true") == "true",
                  "error_count": intval("HTML_ERRORS"),
              },
              "lighthouse": {
                  "performance":    intval("PERF"),
                  "accessibility":  intval("A11Y"),
                  "best_practices": intval("BP"),
                  "seo":            intval("SEO"),
                  "report_url":     os.environ.get("REPORT_URL", ""),
              },
              "observatory": {
                  "grade": os.environ.get("OBS_GRADE", "N/A") or "N/A",
                  "score": intval("OBS_SCORE"),
              },
              "ssl": {
                  "grade": os.environ.get("SSL_GRADE", "N/A") or "N/A",
              },
              "oss_impact": oss,
              "ai_pipeline": {
                  "agents": ["claude-code", "cursor-agent", "kimi-agent"],
                  "workflow_count": ai_workflow_count,
                  "models": ["Claude Sonnet 4.6", "Claude Opus 4.6", "Claude Haiku", "Cursor", "Kimi Code"],
              },
          }

          os.makedirs("static-site/status", exist_ok=True)
          with open("static-site/status/data.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          print(json.dumps(data, indent=2))
          PYEOF

      - name: Commit status update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp static-site/status/data.json /tmp/status_generated.json
          git fetch origin master
          git reset --hard origin/master
          cp /tmp/status_generated.json static-site/status/data.json
          git add static-site/status/data.json
          git diff --staged --quiet || git commit -m "chore: update site audit status"
          git push

      - name: Open or close issues per audit check
        uses: actions/github-script@v7
        env:
          PERF:        ${{ needs.lighthouse.outputs.performance }}
          A11Y:        ${{ needs.lighthouse.outputs.accessibility }}
          BP:          ${{ needs.lighthouse.outputs.best_practices }}
          SEO:         ${{ needs.lighthouse.outputs.seo }}
          REPORT_URL:  ${{ needs.lighthouse.outputs.report_url }}
          OBS_GRADE:   ${{ needs.security-scan.outputs.observatory_grade }}
          OBS_SCORE:   ${{ needs.security-scan.outputs.observatory_score }}
          SSL_GRADE:   ${{ needs.security-scan.outputs.ssl_grade }}
          HTML_PASSED: ${{ needs.html-check.outputs.passed }}
          HTML_ERRORS: ${{ needs.html-check.outputs.error_count }}
        with:
          script: |
            const allLabels = [
              { name: 'audit',          color: '0075ca', description: 'Site audit findings' },
              { name: 'performance',    color: 'e4e669', description: 'Performance issue' },
              { name: 'accessibility',  color: '7057ff', description: 'Accessibility issue' },
              { name: 'seo',            color: '008672', description: 'SEO issue' },
              { name: 'best-practices', color: 'ffa500', description: 'Best practices issue' },
              { name: 'security',       color: 'd73a4a', description: 'Security issue' },
              { name: 'html-check',     color: 'bfd4f2', description: 'HTML / link check issue' },
            ];
            for (const lbl of allLabels) {
              try { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...lbl }); } catch (_) {}
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const reportUrl = process.env.REPORT_URL || '';
            const num = (k) => parseInt(process.env[k]) || 0;
            const str = (k) => process.env[k] || 'N/A';
            const lhLine = reportUrl ? `**[View Lighthouse Report](${reportUrl})**` : null;

            const checks = [
              {
                labels: ['audit', 'performance'],
                title:  '[Fix] Lighthouse performance score below threshold',
                failing: num('PERF') > 0 && num('PERF') < 70,
                body: ['## Lighthouse Performance Score Below Threshold', `Current score: **${num('PERF')}/100** (threshold: 70)`, lhLine, `_Auto-opened by [Site Audit](${runUrl})_`].filter(l => l !== null).join('\n\n'),
              },
              {
                labels: ['audit', 'accessibility'],
                title:  '[Fix] Lighthouse accessibility score below threshold',
                failing: num('A11Y') > 0 && num('A11Y') < 80,
                body: ['## Lighthouse Accessibility Score Below Threshold', `Current score: **${num('A11Y')}/100** (threshold: 80)`, lhLine, `_Auto-opened by [Site Audit](${runUrl})_`].filter(l => l !== null).join('\n\n'),
              },
              {
                labels: ['audit', 'best-practices'],
                title:  '[Fix] Lighthouse best-practices score below threshold',
                failing: num('BP') > 0 && num('BP') < 80,
                body: ['## Lighthouse Best Practices Score Below Threshold', `Current score: **${num('BP')}/100** (threshold: 80)`, lhLine, `_Auto-opened by [Site Audit](${runUrl})_`].filter(l => l !== null).join('\n\n'),
              },
              {
                labels: ['audit', 'seo'],
                title:  '[Fix] Lighthouse SEO score below threshold',
                failing: num('SEO') > 0 && num('SEO') < 90,
                body: ['## Lighthouse SEO Score Below Threshold', `Current score: **${num('SEO')}/100** (threshold: 90)`, lhLine, `_Auto-opened by [Site Audit](${runUrl})_`].filter(l => l !== null).join('\n\n'),
              },
              {
                labels: ['audit', 'html-check'],
                title:  '[Fix] HTML / link check failures',
                failing: process.env.HTML_PASSED === 'false' && num('HTML_ERRORS') > 0,
                body: ['## HTML & Link Check Failures', `Found **${num('HTML_ERRORS')} error(s)**.`, `Download the htmlproofer-output artifact from the [audit run](${runUrl}).`, `_Auto-opened by [Site Audit](${runUrl})_`].join('\n\n'),
              },
              {
                labels: ['audit', 'security'],
                title:  '[Fix] SSL/TLS grade below A',
                failing: !['A+', 'A', 'N/A'].includes(str('SSL_GRADE')),
                body: ['## SSL/TLS Grade Below A', `Current SSL Labs grade: **${str('SSL_GRADE')}**`, '[View SSL Labs report](https://www.ssllabs.com/ssltest/analyze.html?d=joemattiello.dev)', `_Auto-opened by [Site Audit](${runUrl})_`].join('\n\n'),
              },
              {
                labels: ['audit', 'security'],
                title:  '[Fix] Mozilla Observatory security score below grade B',
                failing: !['A+', 'A', 'B', 'N/A'].includes(str('OBS_GRADE')),
                body: ['## Mozilla Observatory Score Below Grade B', `Current grade: **${str('OBS_GRADE')}** (${num('OBS_SCORE')}/100)`, '[View Observatory report](https://observatory.mozilla.org/analyze/joemattiello.dev)', '**Common fixes:** add CSP, X-Frame-Options, X-Content-Type-Options: nosniff, HSTS', `_Auto-opened by [Site Audit](${runUrl})_`].join('\n\n'),
              },
            ];

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'audit', state: 'open', per_page: 100,
            });

            for (const check of checks) {
              const existing = openIssues.find(iss => iss.title === check.title);
              if (check.failing) {
                if (!existing) {
                  await github.rest.issues.create({
                    owner: context.repo.owner, repo: context.repo.repo,
                    title: check.title, body: check.body, labels: check.labels,
                  });
                }
              } else if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `✅ This check is now passing. Auto-closing.\n\n_Resolved by [Site Audit](${runUrl})_`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number, state: 'closed',
                });
              }
            }
